<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chatbot UI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-wrapper {
      width: 360px;
      height: 520px;
      background: white;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .chat-header {
      background: #4f46e5;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .chat-body {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #f9f9f9;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 75%;
      padding: 10px;
      border-radius: 12px;
      font-size: 14px;
    }

    .user {
      background: #4f46e5;
      color: white;
      align-self: flex-end;
    }

    .bot {
      background: #e5e7eb;
      align-self: flex-start;
    }

    .chat-footer {
      display: flex;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 0 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="chat-wrapper">

  <div class="chat-header">
    🤖 ChatBot Assistant
  </div>

  <div class="chat-body" id="chatBody">
    <div class="msg bot">Hello 👋 Ask me anything!</div>
  </div>

  <div class="chat-footer">
    <input id="input" type="text" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
async function sendMessage() {
  const input = document.getElementById("input");
  const chatBody = document.getElementById("chatBody");

  const message = input.value;
  if (!message) return;

  // show user message
  chatBody.innerHTML += `<div class="msg user">${message}</div>`;
  chatBody.scrollTop = chatBody.scrollHeight;

  input.value = "";

  // call backend
  const res = await fetch("http://localhost:3000/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  // show bot message
  chatBody.innerHTML += `<div class="msg bot">${data.reply}</div>`;
  chatBody.scrollTop = chatBody.scrollHeight;
}
</script>

</body>
</html>
